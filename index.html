<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PM &amp; PTW Dashboard</title>
<script src="https://apis.google.com/js/api.js"></script>
<script src="https://accounts.google.com/gsi/client"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.0/jspdf.plugin.autotable.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  /* OQEP brand */
  --oqep-orange:#E87722;
  --oqep-orange-lt:#FF9442;
  --oqep-teal:#1B4D5A;
  --oqep-teal-dk:#0F2F38;
  /* Dashboard system */
  --bg:#0a1318;
  --bg2:#0f1c23;
  --panel:#14252e;
  --panel2:#1a2f3a;
  --line:#26404e;
  --line-hi:#345768;
  --ink:#eef4f8;
  --dim:#8aa3b3;
  --dim2:#5c7585;
  --accent:var(--oqep-orange);
  --accent-soft:rgba(232,119,34,.14);
  --teal:var(--oqep-teal);
  --teal-lt:#3a8ea3;
  --green:#3bb273;
  --amber:#f2a541;
  --red:#e34234;
  --red-dk:#a02b22;
}
html,body{background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;
  min-height:100vh;-webkit-font-smoothing:antialiased;font-feature-settings:'cv11','ss01';
  background-image:radial-gradient(circle at 20% -10%,rgba(232,119,34,.06),transparent 50%),
    radial-gradient(circle at 80% 110%,rgba(27,77,90,.18),transparent 55%);}
body.alarm-on{animation:bodyflash 1.05s infinite}
@keyframes bodyflash{0%,100%{background-color:var(--bg)}50%{background-color:#2a0e10}}

/* ════════ Header ════════ */
.hdr{background:linear-gradient(110deg,var(--oqep-teal-dk) 0%,var(--oqep-teal) 70%,#235b6a 100%);
  border-bottom:1px solid var(--line-hi);padding:18px 28px;display:flex;justify-content:space-between;
  align-items:center;flex-wrap:wrap;gap:18px;position:relative;overflow:hidden}
.hdr::before{content:'';position:absolute;top:0;right:0;width:240px;height:100%;
  background:linear-gradient(90deg,transparent,rgba(232,119,34,.08));pointer-events:none}
.hdr-l{display:flex;align-items:center;gap:18px}
.hdr-logo{height:44px;width:auto;background:rgba(255,255,255,.96);padding:7px 13px;border-radius:6px;
  box-shadow:0 2px 8px rgba(0,0,0,.3)}
.hdr-title h1{font-size:18px;font-weight:800;letter-spacing:.2px;color:#fff}
.hdr-title .sub{font-size:10.5px;color:#9fc4cf;margin-top:3px;text-transform:uppercase;
  letter-spacing:1.6px;font-weight:600}
.hdr-r{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.clock{font-size:11.5px;color:#cae0e5;font-family:'JetBrains Mono',monospace;font-weight:500;
  background:rgba(0,0,0,.22);padding:7px 11px;border-radius:5px;border:1px solid rgba(255,255,255,.08)}
.hdr-btns{display:flex;gap:7px;flex-wrap:wrap}

/* ════════ Tabs ════════ */
.tabs{display:flex;gap:0;background:var(--bg2);border-bottom:1px solid var(--line);
  padding:0 18px;flex-wrap:wrap;box-shadow:0 1px 0 rgba(255,255,255,.02)}
.tab{background:none;border:none;color:var(--dim);cursor:pointer;padding:14px 16px;font-family:'Inter';
  font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;
  border-bottom:2.5px solid transparent;transition:.15s;position:relative}
.tab:hover{color:var(--ink);background:rgba(255,255,255,.02)}
.tab.on{color:var(--accent);border-bottom-color:var(--accent)}
.tab .badge{display:inline-block;background:var(--red);color:#fff;font-size:10px;border-radius:9px;
  padding:1px 6px;margin-left:5px;font-family:'JetBrains Mono';animation:pulse 1.2s infinite;font-weight:700}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.93)}}

.wrap{padding:24px 28px 80px;max-width:980px}
.secttl{font-size:11.5px;text-transform:uppercase;letter-spacing:1.3px;color:var(--accent);
  font-weight:800;margin:24px 0 13px;display:flex;align-items:center;gap:10px}
.secttl::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--line),transparent)}
.secttl.dim{color:var(--dim)}

/* ════════ Panels ════════ */
.panel{background:linear-gradient(180deg,var(--panel),var(--panel2));
  border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:18px;
  box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 8px 24px rgba(0,0,0,.18)}
.panel h3{font-size:12px;text-transform:uppercase;letter-spacing:1.1px;color:var(--accent);
  margin-bottom:16px;font-weight:700;display:flex;align-items:center;gap:8px}
.panel h3::before{content:'';width:3px;height:14px;background:var(--accent);border-radius:2px}
.muted{font-size:12.5px;color:var(--dim);line-height:1.65;margin-bottom:14px}

/* ════════ Forms ════════ */
.field{margin-bottom:13px}
.field label{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.9px;
  color:var(--dim);margin-bottom:5px;font-weight:600}
.field input,.field textarea,.field select{width:100%;background:var(--bg);
  border:1.5px solid var(--line);color:var(--ink);padding:10px 12px;border-radius:6px;
  font-size:13.5px;font-family:'Inter';transition:.15s}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;
  border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field input[type=file]{padding:8px;cursor:pointer}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.hint{font-size:11px;color:var(--dim);margin-top:6px;font-style:italic;line-height:1.5}
.daypick{display:flex;gap:7px;flex-wrap:wrap}
.daybox{display:flex;align-items:center;gap:6px;background:var(--bg);border:1.5px solid var(--line);
  padding:8px 12px;border-radius:6px;font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
.daybox:hover{border-color:var(--accent)}
.daybox input{width:auto;cursor:pointer}

/* ════════ Buttons ════════ */
.btn{background:var(--accent);color:#fff;border:none;cursor:pointer;padding:11px 20px;
  border-radius:6px;font-family:'Inter';font-weight:700;font-size:12.5px;text-transform:uppercase;
  letter-spacing:.7px;transition:.15s;box-shadow:0 2px 8px rgba(232,119,34,.25)}
.btn:hover{background:var(--oqep-orange-lt);box-shadow:0 4px 12px rgba(232,119,34,.35);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn.sm{padding:7px 13px;font-size:11px;box-shadow:none}
.btn.ghost{background:transparent;border:1.5px solid var(--line-hi);color:var(--ink);box-shadow:none}
.btn.ghost:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);transform:none}
.btn.ghost.danger{color:var(--dim)}
.btn.ghost.danger:hover{border-color:var(--red);color:var(--red);background:rgba(227,66,52,.1)}
.btn.green{background:var(--green);box-shadow:0 2px 8px rgba(59,178,115,.25)}
.btn.green:hover{background:#4cc285;box-shadow:0 4px 12px rgba(59,178,115,.35)}
.btn.red{background:var(--red);box-shadow:0 2px 8px rgba(227,66,52,.25)}
.btn.red:hover{background:#ed5547;box-shadow:0 4px 12px rgba(227,66,52,.35)}
.actions{display:flex;gap:9px;margin-top:14px;flex-wrap:wrap}
.note{font-size:11.5px;color:var(--dim);margin-top:15px;line-height:1.7;
  border-top:1px solid var(--line);padding-top:13px}
.empty{text-align:center;color:var(--dim);font-size:13px;padding:36px 14px;line-height:1.8;
  border:1.5px dashed var(--line);border-radius:8px;background:rgba(255,255,255,.01)}

/* ════════ Banners ════════ */
.alarm-banner{background:linear-gradient(110deg,#5a1418,#7a1d22);border:2px solid var(--red);
  border-radius:10px;padding:16px 18px;margin-bottom:16px;animation:bannerflash 1.05s infinite;
  box-shadow:0 8px 24px rgba(227,66,52,.25)}
@keyframes bannerflash{0%,100%{box-shadow:0 8px 24px rgba(227,66,52,.25)}
  50%{box-shadow:0 8px 28px rgba(227,66,52,.65),0 0 0 4px rgba(227,66,52,.18)}}
.alarm-banner .ab-top{font-weight:800;font-size:14px;color:#fff;letter-spacing:.5px}
.alarm-banner .ab-sub{font-size:12.5px;color:#ffd9d6;margin-top:6px;line-height:1.6}
.warn-banner{background:linear-gradient(110deg,rgba(227,66,52,.14),rgba(242,165,65,.1));
  border:1.5px solid var(--red);border-radius:9px;padding:14px 17px;margin-bottom:16px}
.warn-banner .wt{font-weight:700;font-size:13px;color:#ff8e83;text-transform:uppercase;letter-spacing:.7px}
.warn-banner .wl{font-size:12.5px;margin-top:7px;line-height:1.65}

/* ════════ Task cards (Today) ════════ */
.task{display:flex;gap:14px;align-items:flex-start;background:var(--panel);border:1px solid var(--line);
  border-left:4px solid var(--dim);border-radius:8px;padding:14px 17px;margin-bottom:9px;transition:.15s}
.task.st-done{border-left-color:var(--green);opacity:.65}
.task.st-upcoming{border-left-color:var(--dim)}
.task.st-due{border-left-color:var(--amber);background:linear-gradient(90deg,rgba(242,165,65,.06),var(--panel) 60%)}
.task.st-overdue{border-left-color:var(--red);background:#2a1014;animation:taskflash 1.05s infinite}
@keyframes taskflash{0%,100%{background:#2a1014}50%{background:#411820}}
.cbox{width:24px;height:24px;border-radius:6px;border:2px solid var(--dim);flex-shrink:0;display:flex;
  align-items:center;justify-content:center;font-size:15px;font-weight:900;cursor:pointer;margin-top:1px;
  transition:.15s}
.cbox:hover{border-color:var(--accent)}
.task.st-done .cbox{background:var(--green);border-color:var(--green);color:#fff}
.task.st-overdue .cbox{border-color:var(--red)}
.t-body{flex:1}
.t-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.t-time{font-family:'JetBrains Mono';font-weight:700;font-size:13px;background:var(--bg);
  border:1px solid var(--line);color:var(--accent);padding:3px 9px;border-radius:5px}
.t-name{font-weight:700;font-size:14px}
.task.st-done .t-name{text-decoration:line-through;color:var(--dim)}
.t-pill{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;
  padding:3px 9px;border-radius:11px}
.t-pill.done{background:rgba(59,178,115,.2);color:#6dd29b}
.t-pill.up{background:rgba(138,163,179,.16);color:var(--dim)}
.t-pill.due{background:rgba(242,165,65,.2);color:var(--amber)}
.t-pill.overdue{background:var(--red);color:#fff;animation:pulse 1.2s infinite}
.t-detail{font-size:12px;color:var(--dim);margin-top:5px;line-height:1.55}
.t-freq{font-size:10.5px;color:var(--dim2);margin-top:5px;font-weight:600;text-transform:uppercase;
  letter-spacing:.5px}
.t-actions{display:flex;gap:8px;margin-top:11px;flex-wrap:wrap}

/* ════════ Reminder cards ════════ */
.rm-card{display:flex;gap:15px;align-items:center;background:var(--panel);border:1px solid var(--line);
  border-radius:8px;padding:13px 16px;margin-bottom:9px;transition:.15s}
.rm-card:hover{border-color:var(--line-hi)}
.rm-left .rm-time{font-family:'JetBrains Mono';font-weight:700;font-size:15px;background:var(--accent);
  color:#fff;padding:7px 11px;border-radius:6px;box-shadow:0 2px 6px rgba(232,119,34,.3)}
.rm-mid{flex:1}
.rm-name{font-weight:700;font-size:14px}
.rm-detail{font-size:12px;color:var(--dim);margin-top:3px}
.rm-freq{font-size:10.5px;color:var(--accent);margin-top:4px;font-weight:700;
  text-transform:uppercase;letter-spacing:.5px}
.rm-act{display:flex;gap:7px;flex-wrap:wrap}

/* ════════ Permits ════════ */
.permit{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);
  border-radius:9px;padding:16px 18px;margin-bottom:11px;border-left:5px solid var(--teal-lt)}
.permit.s-renew{border-left-color:var(--amber)}
.permit.s-expiry-today,.permit.s-expired{border-left-color:var(--red)}
.permit.s-archived{border-left-color:var(--dim);opacity:.65}
.permit.jc{border-left-color:var(--green)}
.permit-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap}
.permit-no{font-family:'JetBrains Mono';font-weight:700;font-size:15px;color:var(--ink)}
.permit-desc{font-size:12.5px;color:var(--dim);margin-top:3px}
.permit-meta{display:flex;gap:20px;margin-top:13px;flex-wrap:wrap;font-size:11.5px}
.permit-meta .k{color:var(--dim2);text-transform:uppercase;letter-spacing:.6px;font-size:9.5px;font-weight:600}
.permit-meta .v{font-family:'JetBrains Mono';font-weight:700;margin-top:2px;font-size:12.5px}
.pill{font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;padding:4px 10px;
  border-radius:12px;white-space:nowrap}
.pill.ok{background:rgba(59,178,115,.2);color:#6dd29b}
.pill.renew{background:rgba(242,165,65,.22);color:var(--amber)}
.pill.expiry-today,.pill.expired{background:rgba(227,66,52,.25);color:#ff857a}
.pill.archived{background:rgba(138,163,179,.18);color:var(--dim)}
.pill.jc{background:rgba(59,178,115,.2);color:#6dd29b}
.renew-bar{height:6px;background:var(--bg);border-radius:4px;margin-top:12px;overflow:hidden;
  border:1px solid var(--line)}
.renew-bar i{display:block;height:100%;border-radius:3px;transition:.4s}

/* ════════ Events ════════ */
.ev{background:var(--panel);border:1px solid var(--line);border-left:4px solid var(--dim);
  border-radius:7px;padding:13px 15px;margin-bottom:9px}
.ev-top{display:flex;justify-content:space-between;gap:11px;align-items:flex-start;flex-wrap:wrap}
.ev-cat{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;padding:3px 9px;
  border-radius:5px;color:#fff}
.ev-when{font-family:'JetBrains Mono';font-size:11.5px;color:var(--accent);font-weight:600}
.ev-text{font-size:13px;margin-top:8px;line-height:1.6;white-space:pre-wrap}
.ev-person{font-size:11.5px;color:var(--dim);margin-top:5px}
.ev-logged{font-size:10px;color:var(--dim2);margin-top:5px;font-family:'JetBrains Mono'}
.filt{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.filt button{background:var(--panel);border:1px solid var(--line);color:var(--dim);font-size:10.5px;
  font-weight:600;padding:6px 11px;border-radius:14px;cursor:pointer;font-family:'Inter';
  text-transform:uppercase;letter-spacing:.4px;transition:.15s}
.filt button:hover{border-color:var(--accent);color:var(--ink)}
.filt button.on{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ════════ Records ════════ */
.rec{display:flex;gap:14px;padding:12px 15px;background:var(--panel);border:1px solid var(--line);
  border-radius:7px;margin-bottom:7px}
.rec-stamp{font-family:'JetBrains Mono';font-size:10.5px;color:var(--accent);white-space:nowrap;
  padding-top:1px;font-weight:600}
.rec-task{font-weight:700;font-size:13px}
.rec-note{font-size:11.5px;color:var(--dim);margin-top:3px}

/* ════════ Modal ════════ */
.overlay{position:fixed;inset:0;background:rgba(4,8,11,.88);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;z-index:50;padding:20px}
.modal{background:linear-gradient(180deg,var(--panel),var(--panel2));border:2px solid var(--red);
  border-radius:12px;max-width:460px;width:100%;padding:26px;
  box-shadow:0 20px 60px rgba(227,66,52,.35), 0 0 0 1px rgba(227,66,52,.2)}
.modal h2{font-size:16px;color:#ff8e83;text-transform:uppercase;letter-spacing:.8px;font-weight:800}
.modal .mline{font-size:13px;line-height:1.7;margin-top:13px}
.modal .pno{font-family:'JetBrains Mono';font-weight:700;background:var(--bg);padding:3px 8px;border-radius:5px;color:var(--accent)}

@media(max-width:560px){.grid2{grid-template-columns:1fr}.wrap{padding:18px}.hdr{padding:14px 16px}.hdr-logo{height:36px}}

/* ════════ v4 additions ════════ */
.inline-add{display:flex;gap:8px}
.inline-add input{flex:1}
.cust-cats{margin-top:9px;font-size:11px;color:var(--dim);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.cust-chip{background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:3px 10px;
  font-size:11px;color:var(--ink);display:inline-flex;align-items:center;gap:6px}
.cust-chip a{color:var(--red);cursor:pointer;font-weight:800;font-size:13px;line-height:1}
.cust-chip a:hover{color:#ff857a}
input[type=range]{accent-color:var(--accent);cursor:pointer}
.alarm-modal{border-color:var(--red)}
.om-list{margin-top:14px;display:flex;flex-direction:column;gap:9px}
.om-row{display:flex;justify-content:space-between;align-items:center;gap:12px;background:var(--bg);
  border:1px solid var(--line);border-left:4px solid var(--red);border-radius:7px;padding:11px 14px}
.om-name{font-weight:700;font-size:13.5px}
.om-time{font-family:'JetBrains Mono';font-size:11px;color:var(--dim);margin-top:2px}
.om-acts{display:flex;gap:7px;flex-shrink:0}

/* ════════ v5 cloud sync UI ════════ */
.auth-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
#authBtn{font-size:11.5px}
.sync-pill{font-size:11px;font-family:'JetBrains Mono';font-weight:600;padding:5px 10px;
  border-radius:5px;border:1px solid var(--line-hi);background:rgba(0,0,0,.22);
  color:#cae0e5}
.sync-off{color:#9aa9b5}
.sync-busy{color:var(--amber)}
.sync-ok{color:#6dd29b}
.sync-err{color:#ff8e83}
.cloud-info{font-size:11.5px;color:var(--dim);line-height:1.6;margin-top:8px}

<script>
// ═══════════════════════ Google Sheets Cloud Sync ═══════════════════════
var CLIENT_ID = '91766285552-si83id411rrjsocq0qmp6h9p93aoc617.apps.googleusercontent.com';
var SCOPES = 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/drive.file';
var SHEET_NAME = 'Bisat PTW Dashboard Data';
var SHEET_TABS = ['Reminders', 'Permits', 'Events', 'Records', 'Checks', 'CustomCats', 'Settings'];

var gAccessToken = null;
var gSpreadsheetId = null;
var gTokenClient = null;
var gUserEmail = null;
var gSyncStatus = 'offline';  // 'offline' | 'syncing' | 'synced' | 'error'
var gSyncMessage = 'Not signed in';
var gLastSync = null;
var gSyncQueue = false;  // true = a sync is needed
var gSyncBusy = false;
var gInitialized = false;

function setSync(status, message) {
  gSyncStatus = status;
  gSyncMessage = message || status;
  updateSyncBadge();
}
function updateSyncBadge() {
  var b = document.getElementById('syncBadge');
  if (!b) return;
  var icon = {
    offline: '\u26AB',
    syncing: '\u27F3',
    synced: '\u2713',
    error: '\u26A0'
  }[gSyncStatus] || '\u26AB';
  var cls = {
    offline: 'sync-off',
    syncing: 'sync-busy',
    synced: 'sync-ok',
    error: 'sync-err'
  }[gSyncStatus] || 'sync-off';
  b.innerHTML = '<span class="' + cls + '">' + icon + ' ' + esc(gSyncMessage) + '</span>';
}

// Wait for Google APIs to load
function waitForGoogle(cb, tries) {
  tries = tries || 0;
  if (window.gapi && window.google && window.google.accounts && window.google.accounts.oauth2) { cb(); return; }
  if (tries > 100) { setSync('error', 'Google libraries failed to load'); return; }
  setTimeout(function () { waitForGoogle(cb, tries + 1); }, 100);
}

function initGoogle() {
  waitForGoogle(function () {
    try {
      gapi.load('client', function () {
        gapi.client.init({
          discoveryDocs: [
            'https://sheets.googleapis.com/$discovery/rest?version=v4',
            'https://www.googleapis.com/discovery/v1/apis/drive/v3/rest'
          ]
        }).then(function () {
          gTokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: function (resp) {
              if (resp.error) { setSync('error', 'Sign-in failed'); return; }
              gAccessToken = resp.access_token;
              gapi.client.setToken({ access_token: gAccessToken });
              localStorage.setItem('ptw_gToken', gAccessToken);
              localStorage.setItem('ptw_gTokenAt', String(Date.now()));
              setSync('syncing', 'Connecting...');
              afterSignIn();
            }
          });
          gInitialized = true;
          // try silent restore of previous token
          var saved = localStorage.getItem('ptw_gToken');
          var savedAt = parseInt(localStorage.getItem('ptw_gTokenAt') || '0', 10);
          // tokens last ~1hr, don't try if older than 50 min
          if (saved && (Date.now() - savedAt < 50 * 60 * 1000)) {
            gAccessToken = saved;
            gapi.client.setToken({ access_token: saved });
            setSync('syncing', 'Reconnecting...');
            afterSignIn();
          } else {
            setSync('offline', 'Sign in to enable cloud');
          }
        }).catch(function (e) {
          console.error('gapi init error', e);
          setSync('error', 'Google init failed');
        });
      });
    } catch (e) { setSync('error', 'Init exception'); }
  });
}

function signInGoogle() {
  if (!gInitialized) { alert('Google libraries still loading, try again in a few seconds.'); return; }
  setSync('syncing', 'Opening Google sign-in...');
  gTokenClient.requestAccessToken({ prompt: 'consent' });
}

// ─── Silent token renewal (every 50 min while signed in) ───
var gRenewTimer = null;
function silentRenewToken() {
  if (!gInitialized || !gTokenClient) return;
  if (!gAccessToken) return; // not signed in, nothing to renew
  console.log('Renewing Google token silently...');
  try {
    // empty prompt = silent refresh (no popup) if Google still trusts us
    gTokenClient.requestAccessToken({ prompt: '' });
  } catch (e) {
    console.warn('silent renew failed', e);
  }
}
function startRenewTimer() {
  if (gRenewTimer) clearInterval(gRenewTimer);
  // renew every 50 minutes (tokens last 60)
  gRenewTimer = setInterval(silentRenewToken, 50 * 60 * 1000);
}
function stopRenewTimer() {
  if (gRenewTimer) { clearInterval(gRenewTimer); gRenewTimer = null; }
}

function signOutGoogle() {
  if (gAccessToken && google.accounts.oauth2) {
    google.accounts.oauth2.revoke(gAccessToken, function () { });
  }
  gAccessToken = null; gSpreadsheetId = null; gUserEmail = null;
  localStorage.removeItem('ptw_gToken');
  localStorage.removeItem('ptw_gTokenAt');
  localStorage.removeItem('ptw_sheetId');
  stopRenewTimer();
  setSync('offline', 'Signed out');
  render();
}

// after we have a token, find or create the spreadsheet, then load data
function afterSignIn() {
  // try to recover existing sheet ID
  gSpreadsheetId = localStorage.getItem('ptw_sheetId') || null;
  if (gSpreadsheetId) {
    verifySheet().then(function (ok) {
      if (ok) { loadAllFromSheet(); }
      else { findOrCreateSheet(); }
    }).catch(function () { findOrCreateSheet(); });
  } else {
    findOrCreateSheet();
  }
  // also try to get user email
  fetch('https://www.googleapis.com/oauth2/v2/userinfo', {
    headers: { Authorization: 'Bearer ' + gAccessToken }
  }).then(function (r) { return r.json(); }).then(function (d) {
    if (d.email) { gUserEmail = d.email; render(); }
  }).catch(function () { });
  // ─── Start silent token renewal so the user doesn't get auto-signed-out every hour ───
  startRenewTimer();
}

function verifySheet() {
  return gapi.client.sheets.spreadsheets.get({ spreadsheetId: gSpreadsheetId })
    .then(function () { return true; })
    .catch(function () { return false; });
}

// search Drive for existing sheet named SHEET_NAME; if not found, create it
function findOrCreateSheet() {
  setSync('syncing', 'Locating data sheet...');
  gapi.client.drive.files.list({
    q: "name='" + SHEET_NAME + "' and mimeType='application/vnd.google-apps.spreadsheet' and trashed=false",
    fields: 'files(id,name)',
    spaces: 'drive'
  }).then(function (resp) {
    var files = resp.result.files || [];
    if (files.length > 0) {
      gSpreadsheetId = files[0].id;
      localStorage.setItem('ptw_sheetId', gSpreadsheetId);
      ensureTabs().then(loadAllFromSheet);
    } else {
      createNewSheet();
    }
  }).catch(function (e) {
    console.error('drive list err', e);
    setSync('error', 'Could not access Drive');
  });
}

function createNewSheet() {
  setSync('syncing', 'Creating new data sheet...');
  gapi.client.sheets.spreadsheets.create({
    properties: { title: SHEET_NAME },
    sheets: SHEET_TABS.map(function (t) { return { properties: { title: t } }; })
  }).then(function (resp) {
    gSpreadsheetId = resp.result.spreadsheetId;
    localStorage.setItem('ptw_sheetId', gSpreadsheetId);
    // write headers + push current local data
    writeHeaders().then(function () {
      return pushAllToSheet();
    }).then(function () {
      setSync('synced', 'Sheet created & synced');
      gLastSync = new Date();
    });
  }).catch(function (e) {
    console.error('create err', e);
    setSync('error', 'Could not create sheet');
  });
}

function ensureTabs() {
  // verify all tabs exist; create any missing
  return gapi.client.sheets.spreadsheets.get({ spreadsheetId: gSpreadsheetId }).then(function (resp) {
    var existing = (resp.result.sheets || []).map(function (s) { return s.properties.title; });
    var missing = SHEET_TABS.filter(function (t) { return existing.indexOf(t) < 0; });
    if (missing.length === 0) return;
    var requests = missing.map(function (t) { return { addSheet: { properties: { title: t } } }; });
    return gapi.client.sheets.spreadsheets.batchUpdate({
      spreadsheetId: gSpreadsheetId,
      resource: { requests: requests }
    });
  });
}

var HEADERS = {
  Reminders: ['id', 'name', 'detail', 'time', 'freq', 'days', 'dom', 'created'],
  Permits: ['id', 'no', 'desc', 'loc', 'start', 'expiry', 'status', 'jobComplete', 'closedOn'],
  Events: ['id', 'cat', 'when', 'text', 'person', 'logged'],
  Records: ['id', 'task', 'note', 'stamp', 'date'],
  Checks: ['day', 'ids'],
  CustomCats: ['name'],
  Settings: ['key', 'value']
};

function writeHeaders() {
  var data = SHEET_TABS.map(function (tab) {
    return {
      range: tab + '!A1',
      values: [HEADERS[tab]]
    };
  });
  return gapi.client.sheets.spreadsheets.values.batchUpdate({
    spreadsheetId: gSpreadsheetId,
    resource: { valueInputOption: 'RAW', data: data }
  });
}

function serializeRow(obj, headers) {
  return headers.map(function (k) {
    var v = obj[k];
    if (v === undefined || v === null) return '';
    if (typeof v === 'boolean') return v ? 'TRUE' : 'FALSE';
    if (Array.isArray(v)) return v.join(',');
    return String(v);
  });
}
function deserializeRow(row, headers, parseRules) {
  var o = {};
  headers.forEach(function (k, i) {
    var raw = row[i] === undefined ? '' : row[i];
    var rule = parseRules && parseRules[k];
    if (rule === 'bool') o[k] = (raw === 'TRUE' || raw === 'true');
    else if (rule === 'num') o[k] = raw === '' ? 0 : parseFloat(raw);
    else if (rule === 'int') o[k] = raw === '' ? 0 : parseInt(raw, 10);
    else if (rule === 'array_int') o[k] = raw ? raw.split(',').map(function (x) { return parseInt(x, 10); }).filter(function (n) { return !isNaN(n); }) : [];
    else o[k] = raw;
  });
  return o;
}

// ─── Layer 1 safety: count cloud rows before pushing ───
function countCloudRows() {
  return gapi.client.sheets.spreadsheets.values.batchGet({
    spreadsheetId: gSpreadsheetId,
    ranges: ['Reminders!A2:A', 'Permits!A2:A', 'Events!A2:A', 'Records!A2:A']
  }).then(function (resp) {
    var ranges = resp.result.valueRanges || [];
    var nonEmpty = function (arr) { return (arr || []).filter(function (r) { return r && r[0]; }).length; };
    return {
      reminders: nonEmpty((ranges[0] || {}).values),
      permits: nonEmpty((ranges[1] || {}).values),
      events: nonEmpty((ranges[2] || {}).values),
      records: nonEmpty((ranges[3] || {}).values)
    };
  });
}

function pushAllToSheet() {
  if (!gSpreadsheetId) return Promise.resolve();
  // ─── Layer 1 SAFETY GUARD ───
  // Before pushing, check cloud has not got MORE data than local.
  // If it does, refuse to push and pull cloud down instead.
  return countCloudRows().then(function (cloudCounts) {
    var localCounts = {
      reminders: reminders.length,
      permits: permits.length,
      events: events.length,
      records: records.length
    };
    var lost = [];
    // tolerance: cloud can have up to 0 more than local (strict)
    if (cloudCounts.events > localCounts.events) lost.push('Events ' + cloudCounts.events + '→' + localCounts.events);
    if (cloudCounts.permits > localCounts.permits) lost.push('Permits ' + cloudCounts.permits + '→' + localCounts.permits);
    if (cloudCounts.records > localCounts.records) lost.push('Records ' + cloudCounts.records + '→' + localCounts.records);
    if (cloudCounts.reminders > localCounts.reminders) lost.push('Reminders ' + cloudCounts.reminders + '→' + localCounts.reminders);

    if (lost.length > 0) {
      // SAFETY BLOCK: cloud has more rows than local. Do NOT overwrite. Pull cloud down instead.
      console.warn('Layer 1 SAFETY: refusing push, cloud has more data. Lost would be:', lost.join('; '));
      setSync('error', 'Sync blocked: cloud has more data. Reloading...');
      // Reload from cloud — restores any data missing locally
      loadAllFromSheet();
      // Return rejected promise so the caller knows the push didn't happen
      return Promise.reject(new Error('SAFETY_BLOCK: cloud had more data ('+ lost.join('; ') +')'));
    }

    // Safe to push
    var data = [];
    data.push({
      range: 'Reminders!A2',
      values: reminders.map(function (r) { return serializeRow(r, HEADERS.Reminders); })
    });
    data.push({
      range: 'Permits!A2',
      values: permits.map(function (p) { return serializeRow(p, HEADERS.Permits); })
    });
    data.push({
      range: 'Events!A2',
      values: events.map(function (e) { return serializeRow(e, HEADERS.Events); })
    });
    data.push({
      range: 'Records!A2',
      values: records.map(function (r) { return serializeRow(r, HEADERS.Records); })
    });
    var checkRows = [];
    for (var day in checks) if (checks.hasOwnProperty(day)) {
      checkRows.push([day, (checks[day] || []).join(',')]);
    }
    data.push({ range: 'Checks!A2', values: checkRows });
    data.push({ range: 'CustomCats!A2', values: customCats.map(function (c) { return [c]; }) });
    data.push({
      range: 'Settings!A2',
      values: [
        ['soundOn', soundOn ? 'TRUE' : 'FALSE'],
        ['alarmVolume', String(alarmVolume)]
      ]
    });
    return gapi.client.sheets.spreadsheets.values.batchClear({
      spreadsheetId: gSpreadsheetId,
      resource: { ranges: SHEET_TABS.map(function (t) { return t + '!A2:Z'; }) }
    }).then(function () {
      return gapi.client.sheets.spreadsheets.values.batchUpdate({
        spreadsheetId: gSpreadsheetId,
        resource: { valueInputOption: 'RAW', data: data.filter(function (d) { return d.values && d.values.length > 0; }) }
      });
    });
  });
}

function loadAllFromSheet() {
  if (!gSpreadsheetId) return;
  setSync('syncing', 'Loading from cloud...');
  gapi.client.sheets.spreadsheets.values.batchGet({
    spreadsheetId: gSpreadsheetId,
    ranges: SHEET_TABS.map(function (t) { return t + '!A2:Z'; })
  }).then(function (resp) {
    var ranges = resp.result.valueRanges || [];
    var byTab = {};
    SHEET_TABS.forEach(function (t, i) { byTab[t] = (ranges[i] && ranges[i].values) || []; });

    var remRules = { days: 'array_int', dom: 'int' };
    var perRules = { jobComplete: 'bool' };

    var newReminders = byTab.Reminders.map(function (r) { return deserializeRow(r, HEADERS.Reminders, remRules); }).filter(function (x) { return x.id; });
    var newPermits = byTab.Permits.map(function (r) { return deserializeRow(r, HEADERS.Permits, perRules); }).filter(function (x) { return x.id; });
    // permit id must be numeric for our local logic
    newPermits.forEach(function (p) { var n = parseInt(p.id, 10); if (!isNaN(n)) p.id = n; });
    var newEvents = byTab.Events.map(function (r) { return deserializeRow(r, HEADERS.Events); }).filter(function (x) { return x.id; });
    newEvents.forEach(function (e) { var n = parseFloat(e.id); if (!isNaN(n)) e.id = n; });
    var newRecords = byTab.Records.map(function (r) { return deserializeRow(r, HEADERS.Records); }).filter(function (x) { return x.id; });
    newRecords.forEach(function (r) { var n = parseFloat(r.id); if (!isNaN(n)) r.id = n; });

    var newChecks = {};
    byTab.Checks.forEach(function (row) {
      if (row[0]) newChecks[row[0]] = row[1] ? row[1].split(',') : [];
    });
    var newCats = byTab.CustomCats.map(function (r) { return r[0]; }).filter(function (x) { return x; });
    var newSoundOn = soundOn, newVol = alarmVolume;
    byTab.Settings.forEach(function (row) {
      if (row[0] === 'soundOn') newSoundOn = (row[1] === 'TRUE');
      if (row[0] === 'alarmVolume') newVol = parseFloat(row[1]) || alarmVolume;
    });

    // Merge: cloud overrides local where there's overlap, but keep local-only that isn't on cloud
    // (since local was just written, this is normally equivalent to "cloud == local")
    reminders = newReminders;
    permits = newPermits;
    events = newEvents;
    records = newRecords;
    checks = newChecks;
    customCats = newCats;
    soundOn = newSoundOn;
    alarmVolume = newVol;

    // also save to local for offline backup
    DB.set('ptw_reminders', reminders); DB.set('ptw_permits', permits);
    DB.set('ptw_events', events); DB.set('ptw_records', records);
    DB.set('ptw_checks', checks); DB.set('ptw_customCats', customCats);
    DB.set('ptw_soundOn', soundOn); DB.set('ptw_alarmVolume', alarmVolume);

    setSync('synced', 'Synced ' + nowStamp());
    gLastSync = new Date();
    render();
  }).catch(function (e) {
    console.error('load err', e);
    setSync('error', 'Load failed (cached data shown)');
  });
}

// debounced push: any data change requests a sync after a short delay
var syncTimer = null;
function queueSync() {
  if (!gSpreadsheetId || !gAccessToken) return;  // offline OK, local still saves
  gSyncQueue = true;
  if (syncTimer) clearTimeout(syncTimer);
  syncTimer = setTimeout(function () { doSync(); }, 1500);
  setSync('syncing', 'Saving to cloud...');
}
function doSync() {
  if (gSyncBusy) { syncTimer = setTimeout(doSync, 1500); return; }
  gSyncBusy = true;
  pushAllToSheet().then(function () {
    gSyncBusy = false;
    gSyncQueue = false;
    setSync('synced', 'Synced ' + nowStamp());
    gLastSync = new Date();
  }).catch(function (e) {
    gSyncBusy = false;
    if (e && e.message && e.message.indexOf('SAFETY_BLOCK') === 0) {
      // Layer 1 already set the status and triggered a load. Don't overwrite.
      console.warn('Sync skipped (safety):', e.message);
    } else {
      console.error('sync err', e);
      setSync('error', 'Sync failed (local saved)');
    }
  });
}
function syncNow() {
  if (!gAccessToken) { alert('Sign in to Google first.'); return; }
  doSync();
}

// ═══════════════════════ Date helpers ═══════════════════════
var DAY_MS = 86400000;
var WEEKDAYS = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
function todayStr() { return new Date().toISOString().slice(0, 10); }
function pad(n) { return String(n).padStart(2, '0'); }
function fmt(d) { return new Date(d).toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }); }
function nowStamp() {
  var d = new Date();
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) +
    ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}
function nowDateInput() { var d = new Date(); return d.getFullYear() + '-' + pad(d.getMonth() + 1) + '-' + pad(d.getDate()); }
function nowTimeInput() { var d = new Date(); return pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds()); }
function combineDateTime(dStr, tStr) {
  // normalise date
  if (!dStr || isNaN(new Date(dStr).getTime())) dStr = nowDateInput();
  // normalise time; accept "HH:MM", "HH:MM:SS", or "HH:MM:SS AM/PM"
  var raw = (tStr || '').trim();
  var ampm = null;
  var m = raw.match(/(am|pm)$/i);
  if (m) { ampm = m[1].toLowerCase(); raw = raw.replace(/\s*(am|pm)$/i, '').trim(); }
  var parts = raw.split(':');
  var hh = parseInt(parts[0], 10);
  var mm = parseInt(parts[1], 10);
  var ss = parseInt(parts[2], 10);
  if (isNaN(hh)) hh = new Date().getHours();
  if (isNaN(mm)) mm = 0;
  if (isNaN(ss)) ss = 0;
  if (ampm === 'pm' && hh < 12) hh += 12;
  if (ampm === 'am' && hh === 12) hh = 0;
  hh = Math.max(0, Math.min(23, hh));
  mm = Math.max(0, Math.min(59, mm));
  ss = Math.max(0, Math.min(59, ss));
  return dStr + 'T' + pad(hh) + ':' + pad(mm) + ':' + pad(ss);
}
function fmtDT(iso) {
  var d = new Date(iso);
  if (isNaN(d.getTime())) return String(iso || '\u2014');
  return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' }) +
    ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes()) + ':' + pad(d.getSeconds());
}
function addDays(ds, n) { return new Date(new Date(ds).getTime() + n * DAY_MS).toISOString().slice(0, 10); }
function daysBetween(a, b) { return Math.round((new Date(b).setHours(0, 0, 0, 0) - new Date(a).setHours(0, 0, 0, 0)) / DAY_MS); }
function minutesNow() { var d = new Date(); return d.getHours() * 60 + d.getMinutes(); }
function timeToMin(hhmm) { var p = hhmm.split(':'); return parseInt(p[0], 10) * 60 + parseInt(p[1], 10); }
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
  });
}

// ═══════════════════════ Reminder scheduling ═══════════════════════
function dueToday(r) {
  var d = new Date();
  if (r.freq === 'daily') return true;
  if (r.freq === 'weekly') return (r.days || []).indexOf(d.getDay()) > -1;
  if (r.freq === 'monthly') return d.getDate() === (r.dom || 1);
  return false;
}
function freqLabel(r) {
  if (r.freq === 'daily') return 'Daily';
  if (r.freq === 'weekly') {
    var ds = (r.days || []).slice().sort(function (a, b) { return a - b; })
      .map(function (i) { return WEEKDAYS[i]; });
    return 'Weekly \u2014 ' + (ds.length ? ds.join(', ') : 'no days set');
  }
  if (r.freq === 'monthly') return 'Monthly \u2014 day ' + (r.dom || 1);
  return r.freq;
}
function reminderState(r) {
  var day = todayStr();
  if ((checks[day] || []).indexOf(r.id) > -1) return 'done';
  var diff = minutesNow() - timeToMin(r.time);
  if (diff >= 0) {
    return ((acked[day] || []).indexOf(r.id) > -1) ? 'due' : 'overdue';
  }
  if (diff >= -30) return 'due';
  return 'upcoming';
}
function todaysReminders() {
  return reminders.filter(dueToday).slice().sort(function (a, b) {
    return timeToMin(a.time) - timeToMin(b.time);
  });
}
function overdueReminders() {
  return todaysReminders().filter(function (r) { return reminderState(r) === 'overdue'; });
}

// ═══════════════════════ Permit / record helpers ═══════════════════════
function t() { return todayStr(); }
function addRecord(task, note) {
  if (!task || !String(task).trim()) return;
  records.unshift({ id: Date.now() + Math.random(), task: task, note: note || '', stamp: nowStamp(), date: t() });
  DB.set('ptw_records', records);
}
function permitState(p) {
  if (p.status === 'archived') return { key: 'archived', days: 0 };
  var left = daysBetween(t(), p.expiry);
  if (left < 0) return { key: 'expired', days: left };
  if (left === 0) return { key: 'expiry-today', days: 0 };
  if (left <= PTW_WARN_BEFORE && !p.jobComplete) return { key: 'renew', days: left };
  return { key: 'ok', days: left };
}
function activePermits() { return permits.filter(function (p) { return p.status === 'active'; }); }
function archivedPermits() { return permits.filter(function (p) { return p.status === 'archived'; }); }
function renewalsDue() { return activePermits().filter(function (p) { return permitState(p).key === 'renew'; }); }
function forceDue() { return activePermits().filter(function (p) { var k = permitState(p).key; return k === 'expiry-today' || k === 'expired'; }); }

// ═══════════════════════ Form state capture (prevents data loss) ═══════════════════════
function captureForms() {
  // pulls current input values into transient form state, called BEFORE every render
  var g = function (id) { var el = document.getElementById(id); return el ? el.value : null; };
  var gc = function (id) { var el = document.getElementById(id); return el ? el.checked : null; };

  var n;
  n = g('rmName'); if (n !== null) rmForm.name = n;
  n = g('rmDetail'); if (n !== null) rmForm.detail = n;
  n = g('rmTime'); if (n !== null) rmForm.time = n;
  n = g('rmFreq'); if (n !== null) rmForm.freq = n;
  n = g('rmDom'); if (n !== null) rmForm.dom = parseInt(n, 10) || 1;
  // weekly days
  var any = false, ds = [];
  for (var i = 0; i < 7; i++) {
    var cb = document.getElementById('rmDay' + i);
    if (cb !== null && cb !== undefined) { any = true; if (cb.checked) ds.push(i); }
  }
  if (any) rmForm.days = ds;

  n = g('pNo'); if (n !== null) ptForm.no = n;
  n = g('pDesc'); if (n !== null) ptForm.desc = n;
  n = g('pLoc'); if (n !== null) ptForm.loc = n;
  n = g('pStart'); if (n !== null) ptForm.start = n;

  n = g('eCat'); if (n !== null) evForm.cat = n;
  n = g('eDate'); if (n !== null) evForm.date = n;
  n = g('eTime'); if (n !== null) evForm.time = n;
  n = g('eText'); if (n !== null) evForm.text = n;
  n = g('ePerson'); if (n !== null) evForm.person = n;

  n = g('rTask'); if (n !== null) rcForm.task = n;

}

// ═══════════════════════ Alarm engine ═══════════════════════
var audioCtx = null;
function getCtx() {
  try {
    if (!audioCtx) { var C = window.AudioContext || window.webkitAudioContext; if (C) audioCtx = new C(); }
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  } catch (e) { return null; }
}
// a 3-second attention-grabbing siren pattern (rising/falling tones)
function playAlarmBurst() {
  // Doorbell-style chime: high tone (E5, ~659Hz) then lower tone (C5, ~523Hz),
  // each with a soft bell envelope. Repeats twice for ding-dong, ding-dong.
  var ctx = getCtx();
  if (!ctx) return;
  var vol = Math.max(0, Math.min(1, alarmVolume));
  if (vol <= 0) return;
  var now = ctx.currentTime;
  // tone definitions: [startOffsetSec, freqHz, durationSec]
  var bell = [
    [0.00, 659.25, 0.80],   // ding
    [0.55, 523.25, 0.95],   // dong
    [1.80, 659.25, 0.80],   // ding (repeat)
    [2.35, 523.25, 0.95]    // dong (repeat)
  ];
  bell.forEach(function (b) {
    var startT = now + b[0];
    var freq = b[1];
    var dur = b[2];
    // a doorbell uses 2 oscillators for richness (fundamental + 5th harmonic)
    [1, 2].forEach(function (mult, idx) {
      var o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.type = 'sine';
      o.frequency.setValueAtTime(freq * mult, startT);
      // bell envelope: very fast attack, slow decay
      var peakVol = idx === 0 ? vol : vol * 0.35;  // harmonic is quieter
      g.gain.setValueAtTime(0.0001, startT);
      g.gain.exponentialRampToValueAtTime(peakVol, startT + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, startT + dur);
      o.start(startT);
      o.stop(startT + dur + 0.05);
    });
  });
}
function testAlarm() { playAlarmBurst(); }

var loggedMissedNotif = {};
function alarmTick() {
  var od = overdueReminders();
  var day = todayStr();
  var ml = missedLogged[day] || [];
  od.forEach(function (r) {
    if (ml.indexOf(r.id) < 0) {
      ml.push(r.id);
      addRecord(r.name + ' \u2014 OVERDUE / not actioned',
        'Scheduled ' + r.time + ', still not completed \u2014 flagged ' + nowStamp());
    }
  });
  missedLogged[day] = ml; DB.set('ptw_missed', missedLogged);

  updateTabTitle(od.length);

  if (od.length > 0) {
    document.body.classList.add('alarm-on');
    // SOUND: short burst every 5 minutes (300000 ms)
    var nowMs = Date.now();
    if (soundOn && (nowMs - lastAlarmSounded >= 300000 || lastAlarmSounded === 0)) {
      playAlarmBurst();
      lastAlarmSounded = nowMs;
      // browser notification fires together with the burst
      od.forEach(function (r) {
        var k = Math.floor(nowMs / 300000);
        if (loggedMissedNotif[r.id] !== k) {
          loggedMissedNotif[r.id] = k;
          fireNotification('\u26A0 Overdue: ' + r.name, 'Scheduled ' + r.time + ' \u2014 not yet actioned.');
        }
      });
    }
    renderOverdueModal(od);
  } else {
    document.body.classList.remove('alarm-on');
    lastAlarmSounded = 0;
    var host = document.getElementById('alarmModalHost');
    if (host) host.innerHTML = '';
  }
}

// ═══════════════════════ ICS export ═══════════════════════
function pad2(n) { return String(n).padStart(2, '0'); }
function icsDate(d) { return d.getFullYear() + pad2(d.getMonth() + 1) + pad2(d.getDate()); }
function buildICS() {
  var lines = [];
  lines.push('BEGIN:VCALENDAR');
  lines.push('VERSION:2.0');
  lines.push('PRODID:-//Bisat Substation//PM-PTW Dashboard//EN');
  lines.push('CALSCALE:GREGORIAN');
  var ICS_DAYS = ['SU', 'MO', 'TU', 'WE', 'TH', 'FR', 'SA'];
  var now = new Date();
  var stamp = now.getFullYear() + pad2(now.getMonth() + 1) + pad2(now.getDate()) +
    'T' + pad2(now.getHours()) + pad2(now.getMinutes()) + '00';
  reminders.forEach(function (r, idx) {
    var hh = r.time.split(':')[0], mm = r.time.split(':')[1];
    var start = new Date();
    start.setHours(parseInt(hh, 10), parseInt(mm, 10), 0, 0);
    var dt = icsDate(start) + 'T' + pad2(hh) + pad2(mm) + '00';
    var rrule = '';
    if (r.freq === 'daily') rrule = 'RRULE:FREQ=DAILY';
    else if (r.freq === 'weekly') {
      var dd = (r.days || []).map(function (i) { return ICS_DAYS[i]; }).join(',');
      rrule = 'RRULE:FREQ=WEEKLY;BYDAY=' + dd;
    } else if (r.freq === 'monthly') {
      rrule = 'RRULE:FREQ=MONTHLY;BYMONTHDAY=' + (r.dom || 1);
    }
    lines.push('BEGIN:VEVENT');
    lines.push('UID:bisat-' + r.id + '-' + idx + '@bisat.local');
    lines.push('DTSTAMP:' + stamp);
    lines.push('DTSTART:' + dt);
    lines.push('DURATION:PT15M');
    lines.push('SUMMARY:' + (r.name || 'Reminder').replace(/[,;\\]/g, ' '));
    if (r.detail) lines.push('DESCRIPTION:' + r.detail.replace(/[,;\\]/g, ' ').replace(/\n/g, ' '));
    if (rrule) lines.push(rrule);
    lines.push('BEGIN:VALARM');
    lines.push('TRIGGER:PT0M');
    lines.push('ACTION:DISPLAY');
    lines.push('DESCRIPTION:' + (r.name || 'Reminder'));
    lines.push('END:VALARM');
    lines.push('END:VEVENT');
  });
  lines.push('END:VCALENDAR');
  return lines.join('\r\n');
}
function exportICS() {
  if (!reminders.length) { alert('Add at least one reminder first.'); return; }
  var blob = new Blob([buildICS()], { type: 'text/calendar' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'Bisat_Reminders_' + t() + '.ics';
  a.click();
}

function exportBackup() {

  };

  a.click();
}
function mergeArray(local, incoming, idKey) {
  var byId = {};
  local.forEach(function (x) { byId[x[idKey]] = x; });
  (incoming || []).forEach(function (x) { byId[x[idKey]] = x; });
  var out = [];
  for (var k in byId) if (byId.hasOwnProperty(k)) out.push(byId[k]);
  return out;
}
function mergeIdMap(local, incoming) {
  var out = {};
  for (var k in local) if (local.hasOwnProperty(k)) out[k] = (local[k] || []).slice();
  for (var k2 in incoming) if (incoming.hasOwnProperty(k2)) {
    var arr = out[k2] || [];
    (incoming[k2] || []).forEach(function (id) { if (arr.indexOf(id) < 0) arr.push(id); });
    out[k2] = arr;
  }
  return out;
}
function doRestore(mode) {
  var input = document.getElementById('restoreFile');
  if (!input || !input.files || !input.files[0]) { alert('Choose a backup .json file first.'); return; }
  var reader = new FileReader();
  reader.onload = function (e) {
    var data;
    try { data = JSON.parse(e.target.result); }
    catch (err) { alert('That file is not a valid backup. Error: ' + err.message); return; }
    if (mode === 'replace') {
      if (!confirm('REPLACE all current data with the backup file? This cannot be undone.')) return;
      reminders = data.reminders || [];
      checks = data.checks || {}; acked = data.acked || {};
      permits = data.permits || []; records = data.records || [];
      events = data.events || []; packs = data.packs || {};
      missedLogged = data.missedLogged || {};
      if (typeof data.soundOn === 'boolean') soundOn = data.soundOn;
      customCats = data.customCats || [];
      if (typeof data.alarmVolume === 'number') alarmVolume = data.alarmVolume;
    } else {
      // merge
      reminders = mergeArray(reminders, data.reminders, 'id');
      permits = mergeArray(permits, data.permits, 'id');
      records = mergeArray(records, data.records, 'id');
      events = mergeArray(events, data.events, 'id');
      checks = mergeIdMap(checks, data.checks);
      acked = mergeIdMap(acked, data.acked);
      missedLogged = mergeIdMap(missedLogged, data.missedLogged);
      // packs: keep newer
      for (var k in (data.packs || {})) if (data.packs.hasOwnProperty(k)) packs[k] = data.packs[k];
      // merge custom categories (union)
      (data.customCats || []).forEach(function (c) { if (customCats.indexOf(c) < 0) customCats.push(c); });
    }
    DB.set('ptw_reminders', reminders); DB.set('ptw_checks', checks); DB.set('ptw_acked', acked);
    DB.set('ptw_permits', permits); DB.set('ptw_records', records); DB.set('ptw_events', events);
    DB.set('ptw_packs', packs); DB.set('ptw_missed', missedLogged); DB.set('ptw_soundOn', soundOn);
    DB.set('ptw_customCats', customCats); DB.set('ptw_alarmVolume', alarmVolume);
    alert('Restore complete. Mode: ' + mode.toUpperCase());
    render();
  };
  reader.readAsText(input.files[0]);
}

// Parse a CSV string into rows (handles quoted fields containing commas)
function parseCSV(text) {
  var rows = [];
  var row = [];
  var field = '';
  var inQ = false;
  for (var i = 0; i < text.length; i++) {
    var c = text[i];
    if (inQ) {
      if (c === '"') {
        if (text[i + 1] === '"') { field += '"'; i++; }
        else inQ = false;
      } else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ',') { row.push(field); field = ''; }
      else if (c === '\n') { row.push(field); rows.push(row); row = []; field = ''; }
      else if (c === '\r') { /* skip */ }
      else field += c;
    }
  }
  if (field.length > 0 || row.length > 0) { row.push(field); rows.push(row); }
  return rows;
}

function fetchPublicCSV(sheetGid) {
  // expects user to have published the sheet to web
  // The published URL pattern uses spreadsheet ID + gid
  var sheetId = localStorage.getItem('ptw_sheetId') || '';
  if (!sheetId) return Promise.resolve([]);
  var url = 'https://docs.google.com/spreadsheets/d/' + sheetId + '/export?format=csv&gid=' + sheetGid;
  return fetch(url).then(function (r) {
    if (!r.ok) throw new Error('Sheet not published or not accessible');
    return r.text();
  }).then(parseCSV);
}

// ─── Public CSV fetcher using the "Published to web" endpoint ───
// Each tab is identified by its numeric "gid". These were obtained from the
// Sheet URL when each tab is selected: ...edit?gid=NUMBER#gid=NUMBER
var PUBLISH_URL_PREFIX = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRCHbxNRJeVuwnXUfmM3OZtZwuN4fCm7LQonVbxsvanZn-GeRHjSAywKjSOBcuf4GabPBSBuMN0EE-D/pub';
var TAB_GIDS = {
  Events: '324519693',
  Permits: '1984413429'
};

function fetchPublishedCSV(tabName) {
  var gid = TAB_GIDS[tabName];
  if (!gid) return Promise.reject(new Error('No GID configured for tab: ' + tabName));
  // /pub?output=csv&gid=NNN serves the named tab as public CSV when the sheet
  // has been Published to web. No authentication required.
  var url = PUBLISH_URL_PREFIX + '?output=csv&gid=' + gid;
  return fetch(url).then(function (r) {
    if (!r.ok) throw new Error('Failed to fetch ' + tabName + ' (status ' + r.status + ')');
    return r.text();
  }).then(parseCSV);
}

  return Promise.all([

    fetchPublishedCSV('Permits').catch(function () { return []; })
  ]).then(function (results) {
    var evRows = results[0] || [];
    var prRows = results[1] || [];
    // first row is headers
    if (evRows.length > 1) {
      var evHeaders = evRows[0];
      publicData.events = evRows.slice(1).filter(function (r) { return r[0]; }).map(function (r) {
        var o = {};
        evHeaders.forEach(function (h, i) { o[h] = r[i] === undefined ? '' : r[i]; });
        return o;
      });
    }
    if (prRows.length > 1) {
      var prHeaders = prRows[0];
      publicData.permits = prRows.slice(1).filter(function (r) { return r[0]; }).map(function (r) {
        var o = {};
        prHeaders.forEach(function (h, i) { o[h] = r[i] === undefined ? '' : r[i]; });
        return o;
      });
    }
    setPublicStatus('Loaded ' + publicData.events.length + ' events, ' + publicData.permits.length + ' permits');
    renderPublicView();
  }).catch(function (e) {
    setPublicStatus('Could not load: ' + e.message);
  });
}

function setPublicStatus(msg) {
  var el = document.getElementById('publicStatus');
  if (el) el.textContent = msg;
}

var publicTab = 'events';
function setPublicTab(t) { publicTab = t; renderPublicView(); }

function renderPublicView() {
  var v = document.getElementById('view');
  if (!v) return;
  var h = '<div class="wrap">' +
    '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin:14px 0 18px">' +
    '<div class="tabs" style="border:none;padding:0;background:transparent;margin:0">' +
    '<button class="tab' + (publicTab === 'events' ? ' on' : '') + '" onclick="setPublicTab(\'events\')">Events Log (' + publicData.events.length + ')</button>' +
    '<button class="tab' + (publicTab === 'permits' ? ' on' : '') + '" onclick="setPublicTab(\'permits\')">Permits (' + publicData.permits.length + ')</button>' +
    '</div>' +
    '<button class="btn sm" onclick="publicDownloadPDF()">\u{1F4C4} Download PDF Report</button>' +
    '</div>';

  if (publicTab === 'events') {
    var fe = publicData.events.slice().sort(function (a, b) {
      var da = new Date(a.when || 0).getTime();
      var db = new Date(b.when || 0).getTime();
      return db - da;
    });
    h += '<div class="secttl">Shift Log &amp; Event Register</div>';
    if (!fe.length) h += '<p class="empty">No events published yet.</p>';
    fe.forEach(function (e) {
      var col = (typeof catColor === 'function') ? catColor(e.cat) : '#7d92a3';
      h += '<div class="ev" style="border-left-color:' + col + '">' +
        '<div class="ev-top"><span class="ev-cat" style="background:' + col + '">' + esc(e.cat || 'General') + '</span>' +
        '<span class="ev-when">' + (e.when ? fmtDT(e.when) : '') + '</span></div>' +
        '<div class="ev-text">' + esc(e.text || '') + '</div>' +
        (e.person ? '<div class="ev-person">\u{1F464} ' + esc(e.person) + '</div>' : '') +
        '</div>';
    });
  } else {
    var fp = publicData.permits.slice().sort(function (a, b) {
      return new Date(b.start || 0).getTime() - new Date(a.start || 0).getTime();
    });
    h += '<div class="secttl">Permits</div>';
    if (!fp.length) h += '<p class="empty">No permits published yet.</p>';
    fp.forEach(function (p) {
      var st = (p.status || 'active');
      h += '<div class="permit s-' + (st === 'archived' ? 'archived' : 'ok') + '">' +
        '<div class="permit-top"><div><div class="permit-no">' + esc(p.no || '') + '</div>' +
        (p.desc ? '<div class="permit-desc">' + esc(p.desc) + '</div>' : '') + '</div>' +
        '<span class="pill ' + (st === 'archived' ? 'archived' : 'ok') + '">' + esc(st) + '</span></div>' +
        '<div class="permit-meta">' +
        (p.loc ? '<div><div class="k">Location</div><div class="v">' + esc(p.loc) + '</div></div>' : '') +
        '<div><div class="k">Start</div><div class="v">' + (p.start ? fmt(p.start) : '') + '</div></div>' +
        '<div><div class="k">Expiry</div><div class="v">' + (p.expiry ? fmt(p.expiry) : '') + '</div></div>' +
        (p.closedOn ? '<div><div class="k">Cancelled</div><div class="v">' + fmt(p.closedOn) + '</div></div>' : '') +
        '</div></div>';
    });
  }

  h += '<div class="note" id="publicStatus" style="margin-top:24px"></div></div>';
  v.innerHTML = h;
}

function bootPublic() {
  // hide normal UI elements
  try {
    var hdrBtns = document.querySelectorAll('.hdr-btns .btn, .auth-row .btn, .tabs');
    hdrBtns.forEach(function (e) { if (e.classList && e.classList.contains('tab')) return; e.style.display = 'none'; });
    var mainTabs = document.querySelectorAll('body > .tabs');
    mainTabs.forEach(function (e) { e.style.display = 'none'; });
    document.title = 'OQEP Bisat \u2014 Read-only View';
  } catch (e) { }
  // We need a sheet ID. If we don't have it cached, the public link can't fetch.
  // Public users get the sheet ID via URL ?sheet=...
  try {
    var p = new URLSearchParams(window.location.search);
    var sid = p.get('sheet');
    if (sid) localStorage.setItem('ptw_sheetId', sid);
  } catch (e) { }
  loadPublicData();
}

// ═══════════════════════ PDF REPORT GENERATOR ═══════════════════════
function getReportRange(range) {
  var now = new Date();
  var start, end;
  if (range === 'today') {
    start = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 0, 0, 0);
    end = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 23, 59, 59);
  } else if (range === 'week') {
    end = new Date(now); end.setHours(23, 59, 59);
    start = new Date(now); start.setDate(start.getDate() - 7); start.setHours(0, 0, 0);
  } else if (range === 'month') {
    end = new Date(now); end.setHours(23, 59, 59);
    start = new Date(now.getFullYear(), now.getMonth(), 1, 0, 0, 0);
  } else if (range === 'lastmonth') {
    // Past calendar month: from 1st of last month to last day of last month
    start = new Date(now.getFullYear(), now.getMonth() - 1, 1, 0, 0, 0);
    end = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);
  } else if (range === 'all') {
    start = new Date(0); end = new Date(now); end.setHours(23, 59, 59);
  } else {
    // custom: read from form inputs
    var fromEl = document.getElementById('reportFrom');
    var toEl = document.getElementById('reportTo');
    start = fromEl && fromEl.value ? new Date(fromEl.value + 'T00:00:00') : new Date(0);
    end = toEl && toEl.value ? new Date(toEl.value + 'T23:59:59') : new Date();
  }
  return { start: start, end: end };
}

function generateReport(range, includeEvents, includePermits) {
  if (!window.jspdf) {
    alert('PDF library still loading — try again in a moment.');
    return;
  }
  var jsPDF = window.jspdf.jsPDF;
  var doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  var rng = getReportRange(range);

  // Select data source: in public mode use the public CSV-derived data,
  // otherwise use the local in-memory data populated by Google Sheets sync.
  var srcEvents = (typeof publicMode !== 'undefined' && publicMode) ? (publicData.events || []) : events;
  var srcPermits = (typeof publicMode !== 'undefined' && publicMode) ? (publicData.permits || []) : permits;

  // ─── Header block with OQEP logo ───
  // Pull the logo data URL from the existing <img> in the header to keep the
  // file size down (no duplicate base64).
  try {
    var logoEl = document.querySelector('.hdr-logo');
    if (logoEl && logoEl.src) {
      // jsPDF auto-detects format; logo is JPEG content despite png mime
      doc.addImage(logoEl.src, 'JPEG', 14, 10, 28, 12);
    }
  } catch (e) {
    // logo failure is non-fatal — continue without it
  }

  // Title block - moved right to make room for logo
  doc.setFontSize(16);
  doc.setFont('helvetica', 'bold');
  doc.setTextColor(27, 77, 90); // dark teal
  doc.text('OQEP Block 60 \u2014 Bisat PPS', 48, 16);
  doc.setFontSize(11);
  doc.setTextColor(232, 119, 34); // OQEP orange to match brand
  doc.text('BPPS Event Log Report', 48, 22);

  doc.setFontSize(9);
  doc.setTextColor(60, 60, 60);
  var rangeLabel = {
    today: 'Today',
    week: 'Last 7 days',
    month: 'Current month',
    lastmonth: 'Past month',
    all: 'All records',
    custom: 'Custom range'
  }[range] || range;
  doc.text('Period: ' + rangeLabel +
    '  (' + rng.start.toLocaleDateString('en-GB') + ' to ' + rng.end.toLocaleDateString('en-GB') + ')', 14, 32);
  doc.text('Generated: ' + nowStamp(), 14, 37);

  // accent line
  doc.setDrawColor(232, 119, 34);
  doc.setLineWidth(1.2);
  doc.line(14, 41, 196, 41);

  var y = 50;

  // Events table
  if (includeEvents) {
    var ev = srcEvents.filter(function (e) {
      var t = new Date(e.when).getTime();
      return t >= rng.start.getTime() && t <= rng.end.getTime();
    }).sort(function (a, b) { return new Date(b.when) - new Date(a.when); });

    doc.setFontSize(12);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(27, 77, 90);
    doc.text('Shift Log & Event Register (' + ev.length + ')', 14, y);
    y += 5;

    if (ev.length === 0) {
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(120, 120, 120);
      doc.text('No events in this period.', 14, y + 3);
      y += 12;
    } else {
      doc.autoTable({
        startY: y,
        head: [['Date/Time', 'Category', 'Person', 'Details']],
        body: ev.map(function (e) {
          return [
            fmtDT(e.when),
            e.cat || '',
            e.person || '',
            e.text || ''
          ];
        }),
        styles: { fontSize: 8, cellPadding: 2 },
        headStyles: { fillColor: [27, 77, 90], textColor: 255, fontStyle: 'bold' },
        alternateRowStyles: { fillColor: [245, 245, 245] },
        columnStyles: {
          0: { cellWidth: 30 },
          1: { cellWidth: 35 },
          2: { cellWidth: 30 },
          3: { cellWidth: 'auto' }
        },
        margin: { left: 14, right: 14 }
      });
      y = doc.lastAutoTable.finalY + 10;
    }
  }

  // Permits table
  if (includePermits) {
    if (y > 250) { doc.addPage(); y = 20; }
    var pr = srcPermits.filter(function (p) {
      var t = new Date(p.start).getTime();
      return t >= rng.start.getTime() && t <= rng.end.getTime();
    }).sort(function (a, b) { return new Date(b.start) - new Date(a.start); });

    doc.setFontSize(12);
    doc.setFont('helvetica', 'bold');
    doc.setTextColor(27, 77, 90);
    doc.text('Permits to Work (' + pr.length + ')', 14, y);
    y += 5;

    if (pr.length === 0) {
      doc.setFontSize(9);
      doc.setFont('helvetica', 'normal');
      doc.setTextColor(120, 120, 120);
      doc.text('No permits in this period.', 14, y + 3);
    } else {
      doc.autoTable({
        startY: y,
        head: [['Permit #', 'Description', 'Location', 'Start', 'Expiry', 'Status']],
        body: pr.map(function (p) {
          return [
            p.no || '',
            p.desc || '',
            p.loc || '',
            p.start ? fmt(p.start) : '',
            p.expiry ? fmt(p.expiry) : '',
            (p.status || 'active') + (p.jobComplete ? ' (job done)' : '')
          ];
        }),
        styles: { fontSize: 8, cellPadding: 2 },
        headStyles: { fillColor: [27, 77, 90], textColor: 255, fontStyle: 'bold' },
        alternateRowStyles: { fillColor: [245, 245, 245] },
        columnStyles: {
          0: { cellWidth: 28 },
          1: { cellWidth: 'auto' },
          2: { cellWidth: 28 },
          3: { cellWidth: 22 },
          4: { cellWidth: 22 },
          5: { cellWidth: 25 }
        },
        margin: { left: 14, right: 14 }
      });
    }
  }

  // Footer with page numbers
  var pageCount = doc.internal.getNumberOfPages();
  for (var i = 1; i <= pageCount; i++) {
    doc.setPage(i);
    doc.setFontSize(8);
    doc.setTextColor(140, 140, 140);
    doc.text('Page ' + i + ' of ' + pageCount, 196, 290, { align: 'right' });
    doc.text('Marmul Falcon Trading & Contracting Co. LLC \u2014 OQEP Block 60 Bisat PPS', 14, 290);
  }

  // Filename: BPPS Event Log naming, with smart suffix for content
  var contentTag = (includeEvents && includePermits) ? '' :
                   (includeEvents ? '_Events' : '_Permits');
  var fname = 'BPPS_Event_Log' + contentTag + '_' + todayStr() + '.pdf';
  doc.save(fname);
}

function publicDownloadPDF() {
  // Show an options modal so public viewers can pick period + content,
  // matching the signed-in dashboard's report options.
  var host = document.getElementById('alarmModalHost') || document.getElementById('modalHost');
  if (!host) { generateReport('all', true, true); return; }
  host.innerHTML = '<div class="overlay"><div class="modal" style="border-color:var(--accent);max-width:480px">' +
    '<h2 style="color:var(--accent)">\u{1F4C4} Download PDF Report</h2>' +
    '<div class="mline" style="margin-top:14px">' +
    '<div class="field"><label>Period</label><select id="pubReportRange">' +
    '<option value="today">Today</option>' +
    '<option value="week">Last 7 days</option>' +
    '<option value="month" selected>Current month</option>' +
    '<option value="lastmonth">Past month</option>' +
    '<option value="all">All records</option>' +
    '<option value="custom">Custom range</option>' +
    '</select></div>' +
    '<div class="field"><label>Include</label><select id="pubReportInclude">' +
    '<option value="both" selected>Events &amp; Permits</option>' +
    '<option value="events">Events log only</option>' +
    '<option value="permits">Permits only</option>' +
    '</select></div>' +
    '<div class="grid2" id="pubCustomRangeRow" style="display:none">' +
    '<div class="field"><label>From</label><input type="date" id="pubReportFrom"></div>' +
    '<div class="field"><label>To</label><input type="date" id="pubReportTo"></div>' +
    '</div>' +
    '</div>' +
    '<div class="actions" style="margin-top:18px">' +
    '<button class="btn" onclick="confirmPublicDownload()">Generate PDF</button>' +
    '<button class="btn ghost" onclick="closePublicReportModal()">Cancel</button>' +
    '</div></div></div>';
  // wire up the custom-range toggle for the modal's own select
  var sel = document.getElementById('pubReportRange');
  if (sel) {
    sel.addEventListener('change', function () {
      var row = document.getElementById('pubCustomRangeRow');
      if (row) row.style.display = (sel.value === 'custom') ? '' : 'none';
    });
  }
}

function closePublicReportModal() {
  var host = document.getElementById('alarmModalHost') || document.getElementById('modalHost');
  if (host) host.innerHTML = '';
}

function confirmPublicDownload() {
  var rangeEl = document.getElementById('pubReportRange');
  var incEl = document.getElementById('pubReportInclude');
  var range = rangeEl ? rangeEl.value : 'month';
  var inc = incEl ? incEl.value : 'both';
  var includeEvents = (inc === 'both' || inc === 'events');
  var includePermits = (inc === 'both' || inc === 'permits');
  if (range === 'custom') {
    var f = document.getElementById('pubReportFrom');
    var t = document.getElementById('pubReportTo');
    if (!f.value || !t.value) { alert('Please pick both From and To dates for a custom range.'); return; }
    // generateReport reads reportFrom / reportTo by ID — mirror values there
    var tempFrom = document.createElement('input'); tempFrom.id = 'reportFrom'; tempFrom.value = f.value; tempFrom.style.display='none'; document.body.appendChild(tempFrom);
    var tempTo = document.createElement('input'); tempTo.id = 'reportTo'; tempTo.value = t.value; tempTo.style.display='none'; document.body.appendChild(tempTo);
    generateReport('custom', includeEvents, includePermits);
    document.body.removeChild(tempFrom); document.body.removeChild(tempTo);
  } else {
    generateReport(range, includeEvents, includePermits);
  }
  closePublicReportModal();
}

function onGenerateReport() {
  var rangeEl = document.getElementById('reportRange');
  var incEl = document.getElementById('reportInclude');
  var range = rangeEl ? rangeEl.value : 'month';
  var inc = incEl ? incEl.value : 'both';
  var includeEvents = (inc === 'both' || inc === 'events');
  var includePermits = (inc === 'both' || inc === 'permits');
  if (range === 'custom') {
    var f = document.getElementById('reportFrom');
    var t = document.getElementById('reportTo');
    if (!f.value || !t.value) { alert('Please pick both From and To dates for a custom range.'); return; }
  }
  generateReport(range, includeEvents, includePermits);
}

// auto-show custom range fields when "custom" is picked
document.addEventListener('change', function (e) {
  if (e.target && e.target.id === 'reportRange') {
    var row = document.getElementById('customRangeRow');
    if (row) row.style.display = (e.target.value === 'custom') ? '' : 'none';
  }
});

function getShareLinkText() {
  var sheetId = localStorage.getItem('ptw_sheetId') || '';
  var base = window.location.origin + window.location.pathname;
  return base + '?view=public&key=' + PUBLIC_TOKEN + '&sheet=' + sheetId;
}

function copyShareLink() {
  var link = getShareLinkText();
  navigator.clipboard.writeText(link).then(function () {
    alert('Read-only link copied to clipboard!\n\nShare this link with your team. They will see Events and Permits only, no editing.');
  }, function () {
    prompt('Copy this link to share read-only view:', link);
  });
}


function boot() {
  try { document.title = baseTitle; } catch (e) { }
  // Public view branch — bypass storage check and Google sign-in entirely
  if (isPublicViewRequested()) {
    publicMode = true;
    bootPublic();
    return;
  }
  if (!storageWorks()) {
    var host = document.getElementById('view');
    if (host) {
      host.innerHTML = '<div class="wrap"><div class="warn-banner">' +
        '<div class="wt">\u26A0 Storage is blocked \u2014 data cannot be saved</div>' +
        '<div class="wl">Your browser is preventing this page from saving data. This usually happens when ' +
        'the file is opened in a private/incognito window, or certain security settings block local storage.</div></div></div>';
    }
    return;
  }
  requestNotifyPermission();
  render();
  alarmTick();
  setInterval(tickClock, 1000);
  setInterval(alarmTick, 30000);
  setInterval(function () { updateTabTitle(overdueReminders().length); }, 1200);
  document.addEventListener('click', function () { getCtx(); }, { once: true });
  // Initialize Google API client
  initGoogle();
}
boot();
